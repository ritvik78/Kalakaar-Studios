<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Login | Kalakaar Studios</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--color-bg-dark) 0%, rgba(0, 0, 0, 0.9) 100%);
            padding: 2rem;
            position: relative;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            padding: 3rem;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            z-index: 2;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #eee;
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-family: inherit;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--color-teal);
        }

        .btn-login {
            width: 100%;
            background: var(--grad-accent);
            color: black;
            border: none;
            padding: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 1rem;
            font-size: 1rem;
            transition: opacity 0.3s;
        }

        .btn-login:hover {
            opacity: 0.9;
        }

        .shape {
            position: absolute;
            background: var(--grad-accent);
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.2;
            z-index: 1;
        }
        .shape-1 { width: 400px; height: 400px; top: -100px; left: -100px; }
        .shape-2 { width: 300px; height: 300px; bottom: -50px; right: -50px; background: var(--grad-hover); }
    </style>
</head>
<body>
    <div class="custom-cursor" id="customCursor"></div>

    <div class="login-container">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="login-card">
            <a href="index.html" class="logo" style="margin-bottom: 2rem; justify-content: center;">
                Kalakaar<span style="color: var(--color-teal);">Studios</span>
            </a>
            
            <h2 style="margin-bottom: 0.5rem; font-size: 1.8rem;">Portal Login</h2>
            <p style="color: #aaa; margin-bottom: 2rem; font-size: 0.9rem;">Sign in to access your dashboard</p>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-control" id="emailInput" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" id="passInput" placeholder="••••••••" required>
                </div>
                
                <div style="display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 2rem;">
                    <label style="display: flex; align-items: center; gap: 0.5rem; color: #ccc; cursor: pointer;">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" style="color: var(--color-teal); text-decoration: none;">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-login ripple-effect">Sign In / Register</button>
            </form>
            
            <p style="margin-top: 2rem; font-size: 0.9rem; color: #aaa;">Don't have an account? <span style="color: white; font-weight: 600; cursor: pointer;">Just enter details to register.</span></p>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Prevent page reload
            
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passInput').value;
            
            if(email) {
                // Determine role based on email (Mock System)
                if (email === 'admin@kalakaar.com' && password === 'admin123') {
                    // Log in as Admin
                    localStorage.setItem('userRole', 'admin');
                    alert('Login Successful! Welcome Admin.');
                    window.location.href = 'admin-dashboard.html';
                } else {
                    // Log in as Artist
                    localStorage.setItem('userRole', 'artist');
                    localStorage.setItem('artistEmail', email);
                    alert('Login Successful! Welcome Artist.');
                    window.location.href = 'artist-dashboard.html';
                }
            }
        });
    </script>
    <script src="js/main.js" defer></script>
</body>
</html>
